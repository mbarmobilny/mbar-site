name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    container:
      image: node:20-bookworm

    steps:
      - name: Install download tools
        run: |
          apt-get update
          apt-get install -y curl ca-certificates tar

      - name: Download repository snapshot
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          ARCHIVE_PATH="${RUNNER_TEMP}/repo.tar.gz"
          EXTRACT_DIR="${RUNNER_TEMP}/repo-src"
          rm -rf "${EXTRACT_DIR}"
          mkdir -p "${EXTRACT_DIR}"
          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "${ARCHIVE_PATH}"
          tar -xzf "${ARCHIVE_PATH}" -C "${EXTRACT_DIR}" --strip-components=1
          cp -R "${EXTRACT_DIR}/." .

      - name: Verify runtime and workspace
        run: |
          node --version
          npm --version
          test -f package.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
